<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connections — Weekly 45×45</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Connections</h1>
      <p class="subtitle">Weekly 45×45</p>
      <div class="meta-row">
        <div class="meta-pill"><span class="meta-label">Date</span><span id="seedLabel">—</span></div>
        <div class="meta-pill"><span class="meta-label">Mistakes</span><span id="mistakes">0 / 4</span></div>
        <div class="meta-pill"><span class="meta-label">Groups</span><span id="groups">0 / 45</span></div>
      </div>
      <div id="strikes" class="strikes" aria-label="Mistakes remaining"></div>
    </header>

    <section id="statusBanner" class="status-banner" aria-live="polite"></section>

    <section id="solvedTray" class="solved-tray" aria-label="Solved groups"></section>

    <section class="controls" aria-label="Controls">
      <button id="shuffleBtn" type="button">Shuffle</button>
      <button id="deselectBtn" type="button">Deselect All</button>
      <button id="submitBtn" type="button" class="submit-btn">Submit</button>
    </section>

    <section id="board" class="board" aria-label="Puzzle board"></section>
  </main>

  <script>
    window.CONNECTIONS_CONFIG = {
      storagePrefix: 'connections-weekly45',
      puzzleType: 'weekly',
      categoryCount: 45,
      headingLabel: 'Week of'
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
